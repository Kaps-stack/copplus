name: copplus
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_secure_storage: ^8.0.0
  provider: ^6.0.0
  google_sign_in: ^6.1.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  app_links: ^6.3.2
  url_launcher: ^6.3.1
  image_picker: ^1.2.1
  video_player: ^2.10.1
  chewie: ^1.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/

# Génération automatique des icônes d'application
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoOff.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logoOff.png"

# Génération automatique du splash screen natif
flutter_native_splash:
  color: "#BC7400"
  image: assets/images/logoOff.png
  android_12:
    image: assets/images/logoOff.png
    color: "#BC7400"
  fullscreen: true